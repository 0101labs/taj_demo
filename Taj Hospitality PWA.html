<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Taj · Hospitality PWA</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; background: #1A1611; overflow: hidden; height: 100%; }
  body::-webkit-scrollbar { display: none; }
  ::-webkit-scrollbar { display: none; }
  #root { height: 100vh; }
  button { font-family: inherit; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="lib/tokens.jsx"></script>
<script type="text/babel" src="lib/data.jsx"></script>
<script type="text/babel" src="lib/primitives.jsx"></script>
<script type="text/babel" src="lib/ios-frame.jsx"></script>
<script type="text/babel" src="lib/tabbar.jsx"></script>
<script type="text/babel" src="lib/screen-home.jsx"></script>
<script type="text/babel" src="lib/screen-hotel.jsx"></script>
<script type="text/babel" src="lib/screen-booking.jsx"></script>
<script type="text/babel" src="lib/screen-stay.jsx"></script>
<script type="text/babel" src="lib/screens-rest.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

// ─── Tweaks defaults (persisted via editmode markers)
const TWEAKS = /*EDITMODE-BEGIN*/{
  "theme": "classic",
  "accentGold": "#8E744B",
  "showBrandBg": true,
  "serifFamily": "Georgia"
}/*EDITMODE-END*/;

function App() {
  // nav state
  const [tab, setTab] = useState(() => localStorage.getItem('taj.tab') || 'home');
  const [route, setRoute] = useState(() => JSON.parse(localStorage.getItem('taj.route') || '{"type":"tab"}'));
  const [favorites, setFavorites] = useState(() => new Set(JSON.parse(localStorage.getItem('taj.favs') || '[]')));

  // tweaks
  const [tweaks, setTweaks] = useState(TWEAKS);
  const [tweaksOn, setTweaksOn] = useState(false);

  useEffect(() => { localStorage.setItem('taj.tab', tab); }, [tab]);
  useEffect(() => { localStorage.setItem('taj.route', JSON.stringify(route)); }, [route]);
  useEffect(() => { localStorage.setItem('taj.favs', JSON.stringify([...favorites])); }, [favorites]);

  // Tweaks host protocol
  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOn(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOn(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const updateTweak = (k, v) => {
    const next = { ...tweaks, [k]: v };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
  };

  // Compose tokens from theme + overrides
  const baseTokens = tweaks.theme === 'heritage' ? window.TAJ_TOKENS_HERITAGE : window.TAJ_TOKENS_CLASSIC;
  const tokens = {
    ...baseTokens,
    gold: tweaks.accentGold,
    serif: `"${tweaks.serifFamily}", Georgia, serif`,
  };

  const toggleFav = (id) => {
    setFavorites(prev => {
      const s = new Set(prev);
      s.has(id) ? s.delete(id) : s.add(id);
      return s;
    });
  };

  const goHotel = (hotelId) => setRoute({ type: 'hotel', hotelId });
  const goBook = (hotelId, roomId) => setRoute({ type: 'book', hotelId, roomId });
  const goConfirm = () => setRoute({ type: 'confirm', hotelId: route.hotelId });
  const goTab = () => setRoute({ type: 'tab' });

  const onNav = (id) => {
    setTab(id);
    setRoute({ type: 'tab' });
  };

  // Render tab content
  let content;
  if (route.type === 'hotel') {
    content = <HotelScreen hotelId={route.hotelId} tokens={tokens}
      onBack={goTab} onBook={goBook} favorites={favorites} toggleFav={toggleFav}/>;
  } else if (route.type === 'book') {
    content = <BookingScreen hotelId={route.hotelId} roomId={route.roomId} tokens={tokens}
      onBack={goHotel.bind(null, route.hotelId)} onComplete={goConfirm}/>;
  } else if (route.type === 'confirm') {
    content = <ConfirmScreen hotelId={route.hotelId} tokens={tokens}
      onDone={() => { setRoute({ type: 'tab' }); setTab('trips'); }}/>;
  } else if (tab === 'home') {
    content = <HomeScreen tokens={tokens} onHotel={goHotel} onSearch={() => {}}
      favorites={favorites} toggleFav={toggleFav}/>;
  } else if (tab === 'trips') {
    content = <TripsScreen tokens={tokens} onHotel={goHotel}/>;
  } else if (tab === 'key') {
    content = <StayScreen tokens={tokens}/>;
  } else if (tab === 'neupass') {
    content = <NeuPassScreen tokens={tokens}/>;
  } else {
    content = <ProfileScreen tokens={tokens}/>;
  }

  // Hide tab bar during booking/confirm routes
  const showTabBar = route.type === 'tab' || route.type === 'hotel';

  const isDark = tweaks.theme === 'heritage';

  return (
    <div style={{
      minHeight: '100vh', width: '100%',
      background: `
        radial-gradient(1200px 600px at 20% 10%, ${tokens.goldPale}77, transparent 70%),
        radial-gradient(900px 500px at 80% 80%, ${isDark ? '#2A1F16' : tokens.bgDeep}66, transparent 70%),
        ${isDark ? '#0A0604' : '#2A2218'}
      `,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      padding: '40px 20px', position: 'relative',
      overflow: 'auto',
    }}>

      {/* Brand flourish bg */}
      {tweaks.showBrandBg && (
        <div style={{
          position: 'absolute', top: 40, left: '50%', transform: 'translateX(-50%)',
          display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 12,
          color: isDark ? 'rgba(196,168,116,0.45)' : 'rgba(232,220,194,0.65)',
          pointerEvents: 'none',
        }}>
          <TajLogo size={40}/>
          <TajWordmark size={15} tracking={14}/>
          <div style={{ fontFamily: tokens.sans, fontSize: 9, letterSpacing: 2, opacity: 0.7 }}>
            EST. 1903 · A PART OF THE TATA GROUP
          </div>
        </div>
      )}

      {/* Bottom caption */}
      {tweaks.showBrandBg && (
        <div style={{
          position: 'absolute', bottom: 30, left: 0, right: 0, textAlign: 'center',
          color: isDark ? 'rgba(196,168,116,0.35)' : 'rgba(232,220,194,0.5)',
          pointerEvents: 'none',
        }}>
          <Ornament color="currentColor" width={60}/>
          <div style={{ fontFamily: tokens.serif, fontStyle: 'italic', fontSize: 13, marginTop: 8, opacity: 0.8 }}>
            Taj · A case study in progressive hospitality
          </div>
        </div>
      )}

      {/* Device */}
      <div style={{ position: 'relative', zIndex: 2 }}>
        <IOSDevice dark={isDark} width={390} height={844}>
          <div style={{ position: 'relative', height: '100%', overflow: 'hidden', background: tokens.bg }}>
            <div style={{ height: '100%', overflow: 'auto' }}>
              {content}
            </div>
            {showTabBar && <TabBar current={tab} onNav={onNav} tokens={tokens}/>}
          </div>
        </IOSDevice>
      </div>

      {/* Tweaks panel */}
      {tweaksOn && (
        <div style={{
          position: 'fixed', bottom: 24, right: 24, zIndex: 100,
          width: 280, padding: 18, borderRadius: 18,
          background: '#FDFAF3',
          boxShadow: '0 20px 60px rgba(0,0,0,0.3)',
          border: '1px solid rgba(0,0,0,0.08)',
          fontFamily: 'Inter, sans-serif',
        }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 14 }}>
            <div style={{ color: '#8E744B' }}>{Icon.sparkle}</div>
            <div style={{ fontFamily: 'Cormorant Garamond, serif', fontSize: 20, color: '#1A1611' }}>Tweaks</div>
          </div>

          <TweakLabel>Theme</TweakLabel>
          <div style={{ display: 'flex', gap: 6, marginBottom: 14 }}>
            {['classic', 'heritage'].map(th => (
              <button key={th} onClick={() => updateTweak('theme', th)} style={{
                flex: 1, padding: '8px 10px', borderRadius: 999,
                background: tweaks.theme === th ? '#1A1611' : 'transparent',
                color: tweaks.theme === th ? '#F6F1E8' : '#1A1611',
                border: `1px solid ${tweaks.theme === th ? '#1A1611' : 'rgba(0,0,0,0.15)'}`,
                fontSize: 11, letterSpacing: 1, textTransform: 'uppercase', cursor: 'pointer',
              }}>{th}</button>
            ))}
          </div>

          <TweakLabel>Accent gold</TweakLabel>
          <div style={{ display: 'flex', gap: 8, marginBottom: 14 }}>
            {['#8E744B', '#C4A874', '#B8860B', '#5B2A2A', '#1F3B3B'].map(c => (
              <button key={c} onClick={() => updateTweak('accentGold', c)} style={{
                width: 28, height: 28, borderRadius: '50%',
                background: c, cursor: 'pointer',
                border: tweaks.accentGold === c ? '2px solid #1A1611' : '1px solid rgba(0,0,0,0.1)',
                outline: tweaks.accentGold === c ? '2px solid #fff' : 'none',
                outlineOffset: -4,
              }}/>
            ))}
          </div>

          <TweakLabel>Serif font</TweakLabel>
          <select value={tweaks.serifFamily} onChange={e => updateTweak('serifFamily', e.target.value)} style={{
            width: '100%', padding: '8px 10px', borderRadius: 8,
            border: '1px solid rgba(0,0,0,0.15)', background: '#fff',
            fontFamily: `"${tweaks.serifFamily}", serif`, fontSize: 14,
            marginBottom: 14,
          }}>
            {['Cormorant Garamond', 'Playfair Display', 'Georgia'].map(f => (
              <option key={f} value={f} style={{fontFamily: `"${f}"`}}>{f}</option>
            ))}
          </select>

          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '6px 0' }}>
            <div style={{ fontSize: 12, color: '#1A1611' }}>Show brand backdrop</div>
            <button onClick={() => updateTweak('showBrandBg', !tweaks.showBrandBg)} style={{
              width: 40, height: 22, borderRadius: 999, padding: 2,
              background: tweaks.showBrandBg ? '#8E744B' : '#ccc',
              border: 'none', cursor: 'pointer',
              display: 'flex', justifyContent: tweaks.showBrandBg ? 'flex-end' : 'flex-start',
            }}>
              <div style={{ width: 18, height: 18, borderRadius: '50%', background: '#fff' }}/>
            </button>
          </div>

          <div style={{ height: 1, background: 'rgba(0,0,0,0.08)', margin: '10px 0' }}/>

          <div style={{ fontSize: 10, color: '#8A8275', letterSpacing: 0.5, lineHeight: 1.5 }}>
            Tip: toggle Theme to experience the heritage moodboard — deep tones, gold on near-black, a different kind of palace.
          </div>
        </div>
      )}
    </div>
  );
}

const TweakLabel = ({ children }) => (
  <div style={{
    fontSize: 10, color: '#8A8275', letterSpacing: 1.5,
    textTransform: 'uppercase', marginBottom: 6, fontWeight: 500,
  }}>{children}</div>
);

// Wait a tick for all scripts to define window globals
setTimeout(() => {
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
}, 50);
</script>
</body>
</html>
