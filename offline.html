<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Taj · Offline</title>
<meta name="theme-color" content="#8E744B"/>
<link rel="manifest" href="manifest.webmanifest"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #F6F1E8;
    --ink: #1A1611;
    --ink-muted: #8A8275;
    --gold: #8E744B;
    --gold-light: #C4A874;
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans: 'Inter', -apple-system, system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    font-family: var(--sans);
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
    text-align: center;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 15% 20%, rgba(196,168,116,0.18), transparent 45%),
      radial-gradient(ellipse at 85% 80%, rgba(139,116,75,0.12), transparent 50%);
    z-index: -1;
    pointer-events: none;
  }
  .wrap {
    max-width: 440px;
  }
  .logo {
    width: 68px; height: auto; margin: 0 auto 28px;
    opacity: 0.85;
  }
  .eyebrow {
    font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--gold);
    font-weight: 500;
    margin-bottom: 18px;
  }
  h1 {
    font-family: var(--serif);
    font-size: clamp(34px, 7vw, 52px);
    font-weight: 400;
    line-height: 1.05;
    letter-spacing: -0.5px;
    margin-bottom: 22px;
  }
  h1 em {
    font-style: italic;
    color: var(--gold);
  }
  p {
    font-family: var(--serif);
    font-size: 18px;
    line-height: 1.6;
    color: var(--ink-muted);
    margin-bottom: 36px;
    max-width: 360px; margin-left: auto; margin-right: auto;
  }
  .btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 16px 32px;
    background: var(--ink);
    color: var(--bg);
    border-radius: 999px;
    border: none;
    font-family: var(--sans);
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.25s;
  }
  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(26,22,17,0.2);
  }
  .status {
    margin-top: 28px;
    font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--ink-muted);
    display: inline-flex; align-items: center; gap: 8px;
  }
  .status .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #C87852;
    box-shadow: 0 0 10px rgba(200,120,82,0.5);
  }
  .ornament {
    margin: 40px auto 0;
    display: inline-flex; align-items: center; gap: 14px;
    color: var(--gold);
  }
  .ornament span { width: 40px; height: 1px; background: currentColor; opacity: 0.4; }
  .ornament em {
    font-family: var(--serif); font-style: italic;
    font-size: 14px;
  }
</style>
</head>
<body>
  <div class="wrap">
    <img src="assets/taj-logo.png" alt="Taj" class="logo"/>
    <div class="eyebrow">◆ You're Offline</div>
    <h1>The line is <em>quiet</em><br/>for a moment.</h1>
    <p>Your concierge, Atithi, needs a connection to speak with you. Please check your network and we'll be right back.</p>
    <button class="btn" onclick="location.reload()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
        <path d="M3 12a9 9 0 0 1 15-6.7L21 8M21 3v5h-5M21 12a9 9 0 0 1-15 6.7L3 16M3 21v-5h5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Try again
    </button>
    <div class="status">
      <span class="dot"></span>
      <span id="netStatus">Offline</span>
    </div>
    <div class="ornament">
      <span></span>
      <em>Khamma Ghani</em>
      <span></span>
    </div>
  </div>
  <script>
    // Auto-reload when back online
    window.addEventListener('online', () => {
      document.getElementById('netStatus').textContent = 'Reconnecting…';
      setTimeout(() => location.reload(), 600);
    });
    if (navigator.onLine) {
      document.getElementById('netStatus').textContent = 'Online — retry';
    }
  </script>
</body>
</html>
